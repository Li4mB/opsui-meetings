name: Publish Desktop Update

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 22

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Calculate desktop release version
        id: version
        shell: pwsh
        run: |
          $baseVersion = node -p "require('./apps/desktop/package.json').version"
          $parts = $baseVersion.Trim().Split('.')

          if ($parts.Length -lt 2) {
            throw "Desktop version must be semver-like (major.minor.patch)."
          }

          $buildVersion = "$($parts[0]).$($parts[1]).${{ github.run_number }}"
          "value=$buildVersion" >> $env:GITHUB_OUTPUT
          "tag=v$buildVersion" >> $env:GITHUB_OUTPUT

      - name: Sync desktop version files
        run: node ./apps/desktop/scripts/set-build-version.mjs "${{ steps.version.outputs.value }}"

      - name: Wait for Render healthcheck
        if: ${{ secrets.RENDER_HEALTHCHECK_URL != '' }}
        shell: pwsh
        run: |
          $healthUrl = "${{ secrets.RENDER_HEALTHCHECK_URL }}"
          $deadline = (Get-Date).AddMinutes(15)

          while ((Get-Date) -lt $deadline) {
            try {
              $response = Invoke-WebRequest -Uri $healthUrl -UseBasicParsing -TimeoutSec 20

              if ($response.StatusCode -ge 200 -and $response.StatusCode -lt 300) {
                Write-Host "Render healthcheck passed."
                exit 0
              }
            } catch {
              Write-Host "Render healthcheck not ready yet. Waiting..."
            }

            Start-Sleep -Seconds 20
          }

          throw "Render healthcheck did not become healthy before timeout."

      - name: Write Tauri signing key
        shell: pwsh
        run: |
          $keyPath = Join-Path $env:RUNNER_TEMP "tauri-signing.key"
          [System.IO.File]::WriteAllText($keyPath, $env:TAURI_SIGNING_PRIVATE_KEY)

          "TAURI_SIGNING_PRIVATE_KEY_PATH=$keyPath" >> $env:GITHUB_ENV
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build signed desktop release
        run: npm run build:signed --workspace @opsui/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate updater manifest
        run: node ./apps/desktop/scripts/generate-updater-manifest.mjs "${{ steps.version.outputs.value }}" "${{ github.repository }}" "${{ steps.version.outputs.tag }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: OpsUI Meetings Dashboard ${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*.sig
            apps/desktop/src-tauri/target/release/bundle/nsis/latest.json
